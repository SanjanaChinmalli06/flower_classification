<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or 'Iris Bloom' }}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --background: radial-gradient(circle at top left, #fce7f3 0%, #fef3c7 35%, #e0f2fe 70%, #ffffff 100%);
        --panel: rgba(255, 255, 255, 0.96);
        --panel-strong: #ffffff;
        --text: #111827;
        --muted: #475569;
        --accent: #3b82f6;
        --accent-soft: #fde68a;
        --accent-dark: #1d4ed8;
        --shadow: 0 24px 60px rgba(15, 23, 42, 0.11);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Times New Roman', Times, serif;
        background: var(--background);
        color: var(--text);
        line-height: 1.65;
      }
      .page {
        width: min(1140px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 22px 28px;
        margin-bottom: 32px;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 32px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .brand {
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #f472b6;
        text-decoration: none;
        text-transform: uppercase;
      }
      nav {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
      nav a {
        text-decoration: none;
        color: #475569;
        font-weight: 700;
        padding: 12px 18px;
        border-radius: 999px;
        transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
      }
      nav a:hover,
      nav a.active {
        background: rgba(59, 130, 246, 0.12);
        color: var(--accent-dark);
        transform: translateY(-1px);
      }
      .content {
        display: grid;
        gap: 28px;
      }
      .card {
        background: var(--panel);
        border-radius: 32px;
        padding: 32px;
        box-shadow: var(--shadow);
        border: 1px solid rgba(15, 23, 42, 0.06);
      }
      .hero {
        display: grid;
        gap: 24px;
      }
      .hero h1 {
        margin: 0;
        font-size: clamp(2.6rem, 5vw, 3.75rem);
        line-height: 1.02;
      }
      .hero p {
        margin: 0;
        color: var(--muted);
        max-width: 720px;
      }
      .section-head {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      .section-title {
        margin: 0;
        font-size: clamp(1.7rem, 3vw, 2.3rem);
      }
      .section-copy {
        margin: 0;
        color: var(--muted);
        max-width: 740px;
      }
      .form-grid {
        display: grid;
        gap: 22px;
      }
      .field-group {
        display: grid;
        gap: 10px;
      }
      .input-field {
        width: 100%;
        padding: 14px 18px;
        border: 1px solid #d1d5db;
        border-radius: 18px;
        background: #ffffff;
        color: #111827;
        font-size: 1rem;
      }
      .input-field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      }
      .button-primary,
      .button-secondary {
        border: none;
        border-radius: 999px;
        padding: 16px 28px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .button-primary:hover,
      .button-secondary:hover {
        transform: translateY(-2px);
      }
      .button-primary {
        background: linear-gradient(135deg, #2563eb 0%, #22d3ee 100%);
        color: #ffffff;
        box-shadow: 0 18px 44px rgba(37, 99, 235, 0.2);
      }
      .button-secondary {
        background: #ffffff;
        color: #0f172a;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }
      .info-grid,
      .stats-grid {
        display: grid;
        gap: 24px;
      }
      .info-grid {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .info-card {
        background: var(--panel-strong);
        border-radius: 28px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        padding: 26px;
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 999px;
        font-weight: 700;
      }
      .text-muted {
        color: var(--muted);
      }
      .chart-full {
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
      }
      .preformatted {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
        color: #334155;
        margin: 0;
        background: #f8fafc;
        padding: 16px;
        border-radius: 8px;
        font-size: 0.85rem;
        line-height: 1.4;
        border: 1px solid #e2e8f0;
      }
      .footer {
        text-align: center;
        color: #64748b;
        font-size: 0.95rem;
      }
      @media (max-width: 900px) {
        .page { padding: 28px 0 40px; }
        header { flex-direction: column; align-items: flex-start; }
        .section-head { flex-direction: column; }
      }
      @media (max-width: 780px) {
        .content { gap: 18px; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <a class="brand" href="/">Iris Bloom</a>
        <nav>
          <a href="/" class="{{ 'active' if active_page == 'home' else '' }}">Home</a>
          {% if active_page != 'home' %}
          <a href="/how" class="{{ 'active' if active_page == 'how' else '' }}">How it Works</a>
          <a href="/predict" class="{{ 'active' if active_page == 'predict' else '' }}">Predict</a>
          <a href="/results" class="{{ 'active' if active_page == 'results' else '' }}">Results</a>
          <a href="/species" class="{{ 'active' if active_page == 'species' else '' }}">Iris Species</a>
          <a href="/eda" class="{{ 'active' if active_page == 'eda' else '' }}">EDA</a>
          {% endif %}
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>

      <footer class="footer">Designed for colorful interactive Iris prediction.</footer>
    </div>
  </body>
</html>
